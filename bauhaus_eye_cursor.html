
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

  :root {
    --b1: #fe3424;
    --b2: #fdbf36;
    --b3: #1e69aa;
    --b4: #0d0d0d;
    --cream: #f5f0e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .eye-section {
    background: var(--cream);
    width: 100%;
    overflow: hidden;
    position: relative;
  }

  /* ── GEOMETRIC HEADER BAND (top mosaic) ── */
  .mosaic {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    width: 100%;
    border-bottom: 5px solid var(--b4);
  }
  .mc {
    aspect-ratio: 1;
    position: relative;
    overflow: hidden;
  }
  .mc.red    { background: var(--b1); }
  .mc.yellow { background: var(--b2); }
  .mc.blue   { background: var(--b3); }
  .mc.dark   { background: var(--b4); }
  .mc.cream  { background: var(--cream); }

  .mc .dot {
    position: absolute;
    width: 22%; height: 22%;
    background: var(--b4);
    border-radius: 50%;
  }
  .mc.cream .dot { background: var(--b4); }
  .mc.dark .dot  { background: var(--cream); }
  .mc.red .dot   { background: var(--cream); }

  .dot.tl { top: 18%; left: 18%; }
  .dot.tr { top: 18%; right: 18%; }
  .dot.bl { bottom: 18%; left: 18%; }
  .dot.br { bottom: 18%; right: 18%; }
  .dot.c  { top: 50%; left: 50%; transform: translate(-50%,-50%); }

  .mc .arc {
    position: absolute; width: 100%; height: 100%;
    border-radius: 0;
  }
  .arc.tl-red    { background: var(--b1); border-radius: 0 0 100% 0; top:0; left:0; width:50%; height:50%; }
  .arc.tr-black  { background: var(--b4); border-radius: 0 0 0 100%; top:0; right:0; width:50%; height:50%; }
  .arc.bl-cream  { background: var(--cream); border-radius: 0 100% 0 0; bottom:0; left:0; width:50%; height:50%; }
  .arc.br-yellow { background: var(--b2); border-radius: 100% 0 0 0; bottom:0; right:0; width:50%; height:50%; }
  .arc.full-blue { background: var(--b3); border-radius: 50%; top:10%; left:10%; width:80%; height:80%; }
  .arc.half-cream-br { background: var(--cream); border-radius: 100% 0 0 0; bottom:0; right:0; width:60%; height:60%; }
  .arc.half-cream-tl { background: var(--cream); border-radius: 0 0 100% 0; top:0; left:0; width:55%; height:55%; }

  /* ── STRIPE ZONE ── */
  .stripes {
    width: 100%;
    height: 160px;
    display: flex;
    align-items: stretch;
    border-bottom: 5px solid var(--b4);
    position: relative;
  }
  .stripe {
    flex: 1;
    background: var(--b4);
  }
  .stripe:nth-child(even) {
    background: var(--cream);
  }

  /* ── EYE CONTAINER ── */
  .eye-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-top: 0;
    position: relative;
    overflow: hidden;
  }

  /* The eyeball — almond shape via clip-path */
  .eyeball {
    position: relative;
    width: 90%;
    max-width: 520px;
    aspect-ratio: 2 / 1;
    margin-bottom: 0;
    z-index: 2;
  }

  /* white of the eye */
  .sclera {
    width: 100%;
    height: 100%;
    background: var(--cream);
    border-radius: 50%;
    border: 5px solid var(--b4);
    position: relative;
    overflow: hidden;
    clip-path: ellipse(50% 38% at 50% 50%);
  }

  /* iris + pupil layers — will be translated by JS */
  .iris-group {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 52%; aspect-ratio: 1;
    transition: transform 0.08s ease-out;
    will-change: transform;
  }

  .iris {
    width: 100%; height: 100%;
    background: var(--b3);
    border-radius: 50%;
    border: 5px solid var(--b4);
    position: relative;
  }

  .pupil {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 42%; aspect-ratio: 1;
    background: var(--b4);
    border-radius: 50%;
  }

  .iris-shine {
    position: absolute;
    top: 18%; left: 22%;
    width: 18%; aspect-ratio: 1;
    background: var(--cream);
    border-radius: 50%;
    opacity: 0.6;
  }

  /* eyelid top/bottom arcs */
  .lid-top, .lid-bottom {
    position: absolute;
    left: 0; width: 100%;
    pointer-events: none;
    z-index: 3;
  }
  .lid-top {
    top: 0;
    height: 50%;
    background: var(--cream);
    border-radius: 0 0 50% 50% / 0 0 100% 100%;
    transform: scaleX(1.02);
  }
  .lid-bottom {
    bottom: 0;
    height: 50%;
    background: var(--b1);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    transform: scaleX(1.02);
  }

  /* corner tear shapes */
  .corner-l, .corner-r {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 14%; aspect-ratio: 1;
    background: var(--cream);
    z-index: 4;
    pointer-events: none;
  }
  .corner-l { left: 3%; border-radius: 100% 0 100% 0; }
  .corner-r { right: 3%; border-radius: 0 100% 0 100%; }

  /* ── RED BASE ── */
  .eye-base {
    width: 100%;
    height: 120px;
    background: var(--b1);
    border-top: 5px solid var(--b4);
    position: relative;
    z-index: 1;
  }

  /* label */
  .eye-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 0.3em;
    color: var(--cream); opacity: 0.5;
    padding-bottom: 6px;
  }
</style>

<div class="eye-section" id="eyeSection">

  <!-- mosaic top band -->
  <div class="mosaic">
    <div class="mc red"><div class="dot tl"></div><div class="dot bl"></div></div>
    <div class="mc cream" style="position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;background:var(--b2);border-radius:0 0 100% 0;"></div>
      <div style="position:absolute;top:0;right:0;width:50%;height:50%;background:var(--b4);border-radius:0 0 0 100%;"></div>
    </div>
    <div class="mc cream" style="position:relative;overflow:hidden;">
      <div style="position:absolute;inset:0;background:var(--b2);"></div>
      <div style="position:absolute;bottom:0;left:0;width:100%;height:50%;background:var(--cream);border-radius:100% 100% 0 0;"></div>
    </div>
    <div class="mc dark"><div class="dot tl" style="background:var(--cream)"></div><div class="dot tr" style="background:var(--cream)"></div></div>
    <div class="mc cream" style="position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;width:50%;height:100%;background:var(--b3);"></div>
    </div>
    <div class="mc red"><div class="dot tr"></div><div class="dot br"></div></div>

    <div class="mc yellow"><div class="dot bl"></div></div>
    <div class="mc cream" style="position:relative;overflow:hidden;">
      <div style="position:absolute;inset:0;background:var(--b3);border-radius:0 100% 0 0;"></div>
    </div>
    <div class="mc red" style="position:relative;overflow:hidden;">
      <div class="dot c" style="background:var(--cream);width:30%;height:30%;"></div>
      <div class="dot" style="top:50%;left:62%;background:var(--cream);width:18%;height:18%;"></div>
    </div>
    <div class="mc cream" style="position:relative;overflow:hidden;">
      <div style="position:absolute;bottom:0;right:0;width:80%;height:80%;background:var(--b2);border-radius:100% 0 0 0;"></div>
    </div>
    <div class="mc yellow"><div class="dot tr"></div><div class="dot br"></div></div>
    <div class="mc dark"><div class="dot c" style="background:var(--b1);width:35%;height:35%;"></div></div>
  </div>

  <!-- stripes -->
  <div class="stripes" id="stripes">
    <div class="stripe"></div><div class="stripe"></div><div class="stripe"></div>
    <div class="stripe"></div><div class="stripe"></div><div class="stripe"></div>
    <div class="stripe"></div><div class="stripe"></div><div class="stripe"></div>
    <div class="stripe"></div><div class="stripe"></div><div class="stripe"></div>
    <div class="stripe"></div><div class="stripe"></div><div class="stripe"></div>
    <div class="stripe"></div><div class="stripe"></div><div class="stripe"></div>
    <div class="stripe"></div><div class="stripe"></div><div class="stripe"></div>
  </div>

  <!-- eye -->
  <div class="eye-wrap">
    <div class="eyeball" id="eyeball">
      <div class="sclera" id="sclera">
        <div class="iris-group" id="irisGroup">
          <div class="iris">
            <div class="pupil"></div>
            <div class="iris-shine"></div>
          </div>
        </div>
      </div>
      <div class="lid-top"></div>
      <div class="lid-bottom"></div>
      <div class="corner-l"></div>
      <div class="corner-r"></div>
    </div>
    <div class="eye-base">
      <div class="eye-label">THE ALL-SEEING EYE</div>
    </div>
  </div>

</div>

<script>
const irisGroup = document.getElementById('irisGroup');
const eyeball   = document.getElementById('eyeball');

function trackMouse(e) {
  const rect = eyeball.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;

  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);

  const range = Math.min(rect.width, rect.height) * 1.6;
  const maxShift = rect.width * 0.10;

  if (dist > range) {
    irisGroup.style.transform = 'translate(-50%, -50%)';
    return;
  }

  const factor = Math.min(dist / range, 1);
  const angle = Math.atan2(dy, dx);
  const shift = factor * maxShift;

  const tx = Math.cos(angle) * shift;
  const ty = Math.sin(angle) * shift;

  irisGroup.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
}

document.addEventListener('mousemove', trackMouse);

document.addEventListener('mouseleave', () => {
  irisGroup.style.transform = 'translate(-50%, -50%)';
});
</script>
