<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Time Trader Matrix</title>
<style>
/* ── CRITICAL STRUCTURE & FILE VIBE REPLICAS ──────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#030b16;font-family:'Courier New',monospace;color:#fff;overflow:hidden}

/* Background canvas pinned under UI */
#cv {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
  display:block;
}

/* Scrollable UI Overlay Wrapper */
.app-wrapper {
  position:relative;
  z-index:10;
  width:100%;
  height:100%;
  overflow-y:auto;
  padding:30px 15px;
  background:rgba(3, 11, 22, 0.2); /* Transparent to show the wall animation */
}

.app-container {
  max-width:1000px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:24px;
}

/* ── TYPOGRAPHY HERO HEADER ──────────────────────────────────────────── */
header {
  text-align:center;
  margin-bottom:10px;
}
.eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:rgba(0,210,235,.55);margin-bottom:10px}
.title{font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:900;color:#fff;letter-spacing:.04em;text-shadow:0 0 60px rgba(0,180,230,.35),0 0 120px rgba(0,120,200,.2)}
.title span{color:#00d8f0}

/* ── NEON GLASS GLOW PANELS ──────────────────────────────────────────── */
.neon-panel {
  background:rgba(5,20,38,0.75);
  border:1px solid rgba(0,218,240,0.25);
  box-shadow:0 0 30px rgba(0,180,230,0.15), inset 0 0 15px rgba(0,218,240,0.05);
  border-radius:6px;
  padding:20px;
}

.panel-title {
  font-size:12px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:#00d8f0;
  margin-bottom:16px;
  border-bottom:1px solid rgba(0,218,240,0.2);
  padding-bottom:6px;
  font-weight: bold;
}

/* ── INPUTS & TECH BUTTONS ───────────────────────────────────────────── */
.flex-row-panel {
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  align-items:center;
  justify-content:space-between;
}
.input-group { display:flex; align-items:center; gap:10px; }
label { font-size:11px; text-transform:uppercase; color:rgba(100,180,210,0.7); letter-spacing:0.12em; }

input[type="number"], input[type="text"] {
  background:rgba(3,11,22,0.85);
  border:1px solid rgba(0,218,240,0.35);
  color:#fff;
  padding:8px 12px;
  border-radius:4px;
  font-family:inherit;
  outline:none;
}
input[type="number"]:focus, input[type="text"]:focus {
  border-color:#00d8f0;
  box-shadow:0 0 12px rgba(0,218,240,0.4);
}

.btn {
  background:linear-gradient(90deg, #005c8a, #0099be);
  color:#fff;
  border:none;
  padding:9px 18px;
  font-family:inherit;
  font-weight:bold;
  text-transform:uppercase;
  letter-spacing:0.1em;
  border-radius:4px;
  cursor:pointer;
  transition:all 0.2s ease;
}
.btn:hover {
  box-shadow:0 0 15px #00d8f0;
  transform:translateY(-1px);
}

/* ── TRACKING HOURLY BLOCKS ──────────────────────────────────────────── */
.hour-pool-wrapper {
  display:flex;
  flex-direction:column;
  gap:10px;
}
.pool-metrics {
  display:flex;
  justify-content:space-between;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:rgba(0,210,235,0.7);
}
.hour-matrix-container {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  min-height:56px;
  background:rgba(3,11,22,0.6);
  border:1px dashed rgba(0,218,240,0.25);
  padding:10px;
  border-radius:4px;
  align-items: center;
}

/* Draggable Engine Block */
.hour-block {
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg, rgba(120,230,255,0.25), rgba(0,92,138,0.5));
  border:1px solid rgba(0,218,240,0.7);
  box-shadow:inset 0 1px 4px rgba(255,255,255,0.15), 0 0 8px rgba(0,218,240,0.2);
  border-radius:4px;
  font-weight:bold;
  font-size:11px;
  color:#fff;
  cursor:grab;
  user-select:none;
}
.hour-block:active { cursor:grabbing; }

/* ── TASK MATRIX WORKSPACE ───────────────────────────────────────────── */
.workspace-grid {
  display:grid;
  grid-template-columns:1fr 1.6fr;
  gap:20px;
  align-items:start;
}
@media (max-width: 768px) { .workspace-grid { grid-template-columns:1fr; } }

.form-layout { display:flex; flex-direction:column; gap:16px; }

/* ── TODO SYSTEM ROWS ────────────────────────────────────────────────── */
.todo-list-container { display:flex; flex-direction:column; gap:12px; }

.task-card {
  background:rgba(3,16,33,0.85);
  border-left:4px solid #00d8f0;
  border-top:1px solid rgba(0,218,240,0.15);
  border-right:1px solid rgba(0,218,240,0.15);
  border-bottom:1px solid rgba(0,218,240,0.15);
  border-radius:0 4px 4px 0;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  transition:all 0.2s ease;
}
.task-card.drag-over {
  border-color:#fff;
  background:rgba(0,218,240,0.15);
  box-shadow:0 0 20px rgba(0,218,240,0.35);
}

.task-info { display:flex; flex-direction:column; gap:6px; flex-grow:1; }
.task-title { font-size:14px; font-weight:bold; letter-spacing:0.03em; color:#fff; }

.task-allocated-blocks {
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  min-height:26px;
  padding:4px;
  background:rgba(0,0,0,0.25);
  border-radius:4px;
  align-items:center;
}
/* Shrunk version inside cards */
.task-allocated-blocks .hour-block {
  width:24px; height:24px; font-size:9px;
  background:linear-gradient(135deg, rgba(0,218,240,0.4), rgba(0,55,110,0.6));
  cursor: default;
}

.task-actions { display:flex; align-items:center; gap:12px; }

/* Tech Switch Custom Controls */
.checkbox-container {
  display:inline-flex; align-items:center; cursor:pointer; font-size:11px;
  text-transform:uppercase; color:rgba(0,218,240,0.7); gap:6px;
  user-select: none;
}
.checkbox-container input { display:none; }
.custom-checkmark {
  width:16px; height:16px; border:1px solid #00d8f0; border-radius:3px;
  display:inline-block; position:relative; background: rgba(0,0,0,0.3);
}
.checkbox-container input:checked + .custom-checkmark { background:#00d8f0; }
.checkbox-container input:checked + .custom-checkmark::after {
  content:''; position:absolute; left:4px; top:1px; width:4px; height:8px;
  border:solid #030b16; border-width:0 2px 2px 0; transform:rotate(45deg);
}

/* Completed Modifiers */
.task-card.completed {
  border-left-color:rgba(100,180,210,0.3);
  opacity:0.45;
}
.task-card.completed .task-title { text-decoration:line-through; color:rgba(255,255,255,0.4); }

.delete-x-btn {
  padding:4px 8px; font-size:11px; background:rgba(235,60,60,0.15); border:1px solid rgba(235,60,60,0.4);
  color:#ff8888; border-radius:3px; cursor:pointer; font-family: inherit;
}
.delete-x-btn:hover { background:rgba(235,60,60,0.4); color:#fff; }
</style>
</head>
<body>

<canvas id="cv"></canvas>

<div class="app-wrapper">
  <div class="app-container">
    
    <header>
      <div class="eyebrow">Visual Human Capital Allocation Matrix</div>
      <div class="title">TIME <span>TRADER</span></div>
    </header>

    <div class="neon-panel flex-row-panel">
      <div class="input-group">
        <label for="hours-to-mint">Awake Cycle Capacity</label>
        <input type="number" id="hours-to-mint" value="16" min="1" max="24" style="width:70px;">
        <span style="font-size:11px; color:#00d8f0">HRS</span>
      </div>
      <button class="btn" id="generate-pool-btn">Initialize Hour Banks</button>
    </div>

    <div class="neon-panel hour-pool-wrapper">
      <div class="pool-metrics">
        <span>Liquid Time Reserves (Drag Blocks Below)</span>
        <div>Available Pool: <span id="pool-counter" style="color:#00d8f0; font-weight:bold;">0</span> Hours</div>
      </div>
      <div class="hour-matrix-container" id="global-hour-reservoir">
        </div>
    </div>

    <div class="workspace-grid">
      
      <div class="neon-panel">
        <div class="panel-title">Commit Operation</div>
        <div class="form-layout">
          <div style="display:flex; flex-direction:column; gap:6px;">
            <label>Operation Label</label>
            <input type="text" id="new-task-name" placeholder="e.g., Code Smart Contracts">
          </div>
          <div style="display:flex; flex-direction:column; gap:6px;">
            <label>Upfront Cost Allocation (Hours)</label>
            <input type="number" id="new-task-hours" value="2" min="0" max="24">
          </div>
          <button class="btn" id="add-task-btn" style="width:100%;">Deploy Task Matrix</button>
        </div>
      </div>

      <div class="neon-panel">
        <div class="panel-title">Active Task Processing Ledger</div>
        <div class="todo-list-container" id="todo-list-element">
          </div>
      </div>

    </div>

  </div>
</div>

<script>
// ── SECTION 1: AUDIO VISUALIZER MOVING CYBERPUNK BACKGROUND ──────────
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');

const CFG = {
  cellW: 32, cellH: 20, gap: 4,
  pattern: [3,5,8,6,2,7,4,9,5,3,7,6,2,8,4,5,3,6,9,4,2,6,8,5],
  maxH: 11,
  scrollSpeedBG: 4,  scrollSpeedMG: 14, scrollSpeedFG: 30,
  waveSpeed: 0.0009, waveAmp: 1.8, particleCount: 65,
};

let W = window.innerWidth;
let H = window.innerHeight;
let lowerH = Math.floor(H * 0.38);
let particles = [];
let last = 0;
let elapsed = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  lowerH = Math.floor(H * 0.38);
  initParticles();
}

function initParticles() {
  particles = [];
  for (let i = 0; i < CFG.particleCount; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.3 + 0.2,
      vy: -(Math.random() * 0.3 + 0.06),
      vx: (Math.random() - .5) * 0.12,
      phase: Math.random() * Math.PI * 2,
      blinkRate: 0.0015 + Math.random() * 0.004,
    });
  }
}

function colHeight(baseH, colIndex, t) {
  const wave1 = Math.sin(t * CFG.waveSpeed + colIndex * 0.55) * CFG.waveAmp;
  const wave2 = Math.sin(t * CFG.waveSpeed * 1.7 + colIndex * 0.33 + 1.2) * (CFG.waveAmp * 0.5);
  return Math.max(1, Math.min(CFG.maxH, Math.round(baseH + wave1 + wave2)));
}

function drawLayer(scrollX, cellW, cellH, gap, alpha, glowScale) {
  const stride = cellW + gap;
  const pat = CFG.pattern;
  const patLen = pat.length;
  const patWidth = patLen * stride;
  const count = Math.ceil(W / stride) + 2;
  const offset = (scrollX % patWidth + patWidth) % patWidth;

  for (let ci = -1; ci <= count; ci++) {
    const rawX = ci * stride - offset;
    const patIdx = ((ci % patLen) + patLen * 4) % patLen;
    const h = colHeight(pat[patIdx], patIdx, elapsed);
    const x = rawX;

    if (x > W + stride || x < -stride) continue;

    const bottomY = H;
    const totalCellH = cellH + gap;
    const stackH = h * totalCellH;

    // Ambient light bloom
    const bloomR = stackH * 0.9 + cellW;
    const bx = x + cellW / 2;
    const by = bottomY - stackH * 0.5;
    const bloom = ctx.createRadialGradient(bx, bottomY, 0, bx, by, bloomR);
    bloom.addColorStop(0, `rgba(0,190,230,${(alpha * 0.12 * glowScale).toFixed(3)})`);
    bloom.addColorStop(0.5, `rgba(0,140,200,${(alpha * 0.05 * glowScale).toFixed(3)})`);
    bloom.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bloom;
    ctx.fillRect(x - bloomR * 0.5, bottomY - bloomR * 1.2, cellW + bloomR, bloomR * 1.2);

    // Grid rendering blocks
    for (let row = 0; row < h; row++) {
      const cy = bottomY - (row + 1) * totalCellH;
      const vAlpha = alpha * (0.15 + 0.85 * (1 - row / h));

      const g = ctx.createLinearGradient(x, cy, x + cellW, cy);
      g.addColorStop(0,    `rgba(120,230,255,${(vAlpha * 0.55).toFixed(3)})`);
      g.addColorStop(0.15, `rgba(0,200,240,${(vAlpha * 0.95).toFixed(3)})`);
      g.addColorStop(0.45, `rgba(0,160,215,${(vAlpha * 0.75).toFixed(3)})`);
      g.addColorStop(0.75, `rgba(0,100,170,${(vAlpha * 0.45).toFixed(3)})`);
      g.addColorStop(1,    `rgba(0,55,110,${(vAlpha * 0.18).toFixed(3)})`);

      ctx.beginPath();
      ctx.roundRect(x, cy, cellW, cellH, 2);
      ctx.fillStyle = g;
      ctx.fill();

      // Mirror glass sheen effect
      const shine = ctx.createLinearGradient(x, cy, x + cellW, cy);
      shine.addColorStop(0,   `rgba(180,245,255,${(vAlpha * 0.85).toFixed(3)})`);
      shine.addColorStop(0.25,`rgba(255,255,255,${(vAlpha * 0.9).toFixed(3)})`);
      shine.addColorStop(0.6, `rgba(100,220,245,${(vAlpha * 0.55).toFixed(3)})`);
      shine.addColorStop(1,   `rgba(0,140,190,${(vAlpha * 0.1).toFixed(3)})`);
      ctx.fillStyle = shine;
      ctx.fillRect(x, cy, cellW, 2);
    }
  }
}

function drawScanlines() {
  const count = 5;
  for (let i = 0; i < count; i++) {
    const speed = 18 + i * 7;
    const y = (elapsed * speed * 0.001 + (H / count) * i) % H;
    const w = 80 + Math.sin(elapsed * 0.002 + i * 1.3) * 50;
    const startX = (elapsed * (8 + i * 3) * 0.001) % (W + w * 2) - w;
    const a = 0.018 + 0.01 * Math.sin(elapsed * 0.003 + i);
    const g = ctx.createLinearGradient(startX, 0, startX + w, 0);
    g.addColorStop(0,   'rgba(0,200,235,0)');
    g.addColorStop(0.4, `rgba(0,200,235,${a.toFixed(3)})`);
    g.addColorStop(0.6, `rgba(200,240,255,${(a*1.5).toFixed(3)})`);
    g.addColorStop(1,   'rgba(0,200,235,0)');
    ctx.fillStyle = g;
    ctx.fillRect(startX, y, w, 1);
  }
}

function animate(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  elapsed += dt * 1000;

  ctx.clearRect(0, 0, W, H);

  // Background deep space gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#030c18');
  sky.addColorStop(0.5, '#050f20');
  sky.addColorStop(1,   '#06131f');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Atmospheric floor haze
  const haze = ctx.createLinearGradient(0, H - lowerH * 1.8, 0, H);
  haze.addColorStop(0, 'rgba(0,20,50,0)');
  haze.addColorStop(0.35, 'rgba(0,18,45,0.5)');
  haze.addColorStop(1, 'rgba(0,8,20,0.88)');
  ctx.fillStyle = haze;
  ctx.fillRect(0, H - lowerH * 1.8, W, lowerH * 1.8);

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, H - lowerH - 40, W, lowerH + 40);
  ctx.clip();

  // Rendering parallax
  drawLayer(elapsed * CFG.scrollSpeedBG * 0.001, 56, 36, 6, 0.22, 0.6);
  drawLayer(elapsed * CFG.scrollSpeedMG * 0.001, 38, 26, 5, 0.38, 0.85);
  drawLayer(elapsed * CFG.scrollSpeedFG * 0.001, CFG.cellW, CFG.cellH, CFG.gap, 0.82, 1.0);
  ctx.restore();

  drawScanlines();

  // Particles rendering
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.phase += p.blinkRate * dt * 1000;
    if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
    if (p.x < -4) p.x = W + 4;
    if (p.x > W + 4) p.x = -4;
    const ba = 0.08 + 0.42 * (0.5 + 0.5 * Math.sin(p.phase));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(80,215,245,${ba.toFixed(3)})`;
    ctx.fill();
  }
  ctx.restore();

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, W*0.15, W/2, H/2, W*0.75);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,3,12,0.62)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(animate);
}

// Spark background initialization
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(animate);


// ── SECTION 2: INTERACTIVE LOGIC DATA ENGINES ─────────────────────────
let globalHours = []; 
let taskLedger = []; 
let blockIdCounter = 0;

const reservoirElement = document.getElementById('global-hour-reservoir');
const poolCounter = document.getElementById('pool-counter');
const generatePoolBtn = document.getElementById('generate-pool-btn');
const inputMintCount = document.getElementById('hours-to-mint');
const btnAddTask = document.getElementById('add-task-btn');
const inputTaskName = document.getElementById('new-task-name');
const inputTaskHours = document.getElementById('new-task-hours');
const todoContainer = document.getElementById('todo-list-element');

// Mint Hour Blocks into state arrays
function initializeHourReservoir(amount) {
  reservoirElement.innerHTML = '';
  globalHours = [];
  
  for(let i = 0; i < amount; i++) {
    const blockId = `block-id-${blockIdCounter++}`;
    globalHours.push(blockId);
    renderBlockInReservoir(blockId);
  }
  syncReservoirMetrics();
}

function renderBlockInReservoir(id) {
  const block = document.createElement('div');
  block.className = 'hour-block';
  block.id = id;
  block.draggable = true;
  block.innerText = '1H';

  block.addEventListener('dragstart', (e) => {
    block.classList.add('dragging');
    e.dataTransfer.setData('text/plain', block.id);
  });

  block.addEventListener('dragend', () => {
    block.classList.remove('dragging');
  });

  reservoirElement.appendChild(block);
}

function syncReservoirMetrics() {
  poolCounter.innerText = globalHours.length;
}

// Create new data card assignments
function commitNewTask(name, hoursRequested) {
  const cleanedName = name.trim();
  if(!cleanedName) {
    alert("Matrix Error: Operation Label cannot remain unassigned.");
    return;
  }
  if(hoursRequested > globalHours.length) {
    alert("Resource Insufficient: Requested transaction hours exceed liquid supply.");
    return;
  }

  const hijackedBlockIds = [];
  for(let i = 0; i < hoursRequested; i++) {
    const targetingId = globalHours.pop();
    hijackedBlockIds.push(targetingId);
    const itemDom = document.getElementById(targetingId);
    if(itemDom) itemDom.remove();
  }
  syncReservoirMetrics();

  const taskObject = {
    id: `task-uuid-${Date.now()}-${Math.random().toString(36).substr(2, 4)}`,
    title: cleanedName,
    allocatedBlockIds: hijackedBlockIds,
    isComplete: false,
    hourIsSaved: false
  };

  taskLedger.push(taskObject);
  renderTaskLedger();
  inputTaskName.value = '';
}

function renderTaskLedger() {
  todoContainer.innerHTML = '';

  if (taskLedger.length === 0) {
    todoContainer.innerHTML = `<div style="text-align:center; color:rgba(100,180,210,0.3); padding:20px; font-size:11px; letter-spacing: 0.1em;">SYSTEM LEDGER VACANT</div>`;
    return;
  }

  taskLedger.forEach(task => {
    const card = document.createElement('div');
    card.className = `task-card ${task.isComplete ? 'completed' : ''}`;
    card.dataset.id = task.id;

    // Direct Drag-and-Drop mapping parameters per row
    card.addEventListener('dragover', (e) => {
      if(!task.isComplete) {
        e.preventDefault();
        card.classList.add('drag-over');
      }
    });

    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));

    card.addEventListener('drop', (e) => {
      e.preventDefault();
      card.classList.remove('drag-over');
      
      const droppedBlockId = e.dataTransfer.getData('text/plain');
      const blockDom = document.getElementById(droppedBlockId);

      // Verify origin validation status matches global pool arrays
      if(blockDom && globalHours.includes(droppedBlockId)) {
        globalHours = globalHours.filter(id => id !== droppedBlockId);
        task.allocatedBlockIds.push(droppedBlockId);
        blockDom.remove();
        syncReservoirMetrics();
        renderTaskLedger();
      }
    });

    // Populate visual timeline blocks assigned inside item context
    let localBlocksMarkup = '';
    task.allocatedBlockIds.forEach(() => {
      localBlocksMarkup += `<div class="hour-block">1H</div>`;
    });

    card.innerHTML = `
      <div class="task-info">
        <span class="task-title">${task.title}</span>
        <div class="task-allocated-blocks">
          ${localBlocksMarkup}
        </div>
      </div>
      <div class="task-actions">
        ${task.isComplete ? `
          <label class="checkbox-container">
            <input type="checkbox" class="save-toggle" ${task.hourIsSaved ? 'checked' : ''}>
            <span class="custom-checkmark"></span>
            Hour Saved
          </label>
        ` : `
          <button class="btn done-btn" style="padding: 5px 10px; font-size: 10px;">Complete</button>
        `}
        <button class="delete-x-btn">X</button>
      </div>
    `;

    // Process event interactions inside card rows
    const doneBtn = card.querySelector('.done-btn');
    if(doneBtn) {
      doneBtn.addEventListener('click', () => {
        task.isComplete = true;
        renderTaskLedger();
      });
    }

    const saveToggle = card.querySelector('.save-toggle');
    if(saveToggle) {
      saveToggle.addEventListener('change', (e) => {
        task.hourIsSaved = e.target.checked;
        if(task.hourIsSaved) {
          // If hour is marked saved, immediately dispatch items home up to pool
          task.allocatedBlockIds.forEach(id => {
            if(!globalHours.includes(id)) {
              globalHours.push(id);
              renderBlockInReservoir(id);
            }
          });
          task.allocatedBlockIds = [];
        } else {
          // If user deselects saved state, prompt system redistribution parameters
          const pullBackCount = parseInt(prompt("Specify quantity of hour units to re-bind down to task profile:", "1")) || 0;
          const actionableCount = Math.min(pullBackCount, globalHours.length);
          for(let i = 0; i < actionableCount; i++) {
            const returnedId = globalHours.pop();
            task.allocatedBlockIds.push(returnedId);
            const returnedDom = document.getElementById(returnedId);
            if(returnedDom) returnedDom.remove();
          }
        }
        syncReservoirMetrics();
        renderTaskLedger();
      });
    }

    // Completely wipe item structure and return remaining values to balance
    card.querySelector('.delete-x-btn').addEventListener('click', () => {
      if(!task.isComplete || !task.hourIsSaved) {
        task.allocatedBlockIds.forEach(id => {
          globalHours.push(id);
          renderBlockInReservoir(id);
        });
      }
      taskLedger = taskLedger.filter(t => t.id !== task.id);
      syncReservoirMetrics();
      renderTaskLedger();
    });

    todoContainer.appendChild(card);
  });
}

// ── CONNECT EVENT INTERFACES ──────────────────────────────────────────
generatePoolBtn.addEventListener('click', () => {
  const count = parseInt(inputMintCount.value) || 16;
  initializeHourReservoir(count);
});

btnAddTask.addEventListener('click', () => {
  const name = inputTaskName.value;
  const allocation = parseInt(inputTaskHours.value) || 0;
  commitNewTask(name, allocation);
});

// Setup drag listeners to ensure elements register drops anywhere in the parent window container
reservoirElement.addEventListener('dragover', (e) => e.preventDefault());

// Initialize starting pool balance loop
initializeHourReservoir(16);
</script>
